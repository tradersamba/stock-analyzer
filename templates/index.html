<!DOCTYPE html>
<html>
<head>
    <title>The Stock Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>The Stock Analyzer</h1>
        <p>Analyze stocks like a Financial Advisor</p>
    </header>

    <section class="search-box">
    <input id="companyInput" type="text" placeholder="Enter company or ticker name, e.g. Apple" onkeydown="if(event.key === 'Enter') analyzeStock()">        <button onclick="analyzeStock()">Analyze</button>
    </section>

    <main class="dashboard">

        <section class="left-panel">
            <h2>Company Information</h2>

            <div class="info-grid">
                <div>Ticker</div><div id="ticker">—</div>
                <div>Exchange</div><div id="exchange">—</div>
                <div>Price</div><div id="price">—</div>
                <div>EPS</div><div id="eps">—</div>
                <div>P/E</div><div id="pe">—</div>
                <div>Industry</div><div id="industry">—</div>
                <div>Peer Median P/E</div><div id="peerMedian">—</div>
            </div>
        </section>

        <section class="right-panel">
            <h2>Peer Companies</h2>
            <div id="peers" class="peer-list">—</div>
        </section>

    </main>

<section class="analysis-row" style="display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:stretch;">

    <div class="assessment-panel">
        <h2>P/E Ratio Analysis</h2>
        <div id="assessment" class="assessment-scroll">
            Enter a company name and click Analyze.
        </div>
    </div>

    <div class="pe-help-panel">
        <div id="peHelpContent" class="pe-help-scroll">
            <div class="description-placeholder">Description</div>
        </div>
    </div>

</section>

</div>

<script>

const tooltips = {

    eps: `
        <strong>EPS (Earnings Per Share)</strong><br><br>

        The amount of profit the company earns for each share of stock.<br><br>

        <strong>EPS = Net Profit (last 12 months) ÷ Total Shares Outstanding</strong><br><br>

        Example:<br>

        Net Profit = $10 Billion<br>

        Shares Outstanding = 2 Billion<br>

        EPS = $5.00 per share
    `

};

function tooltip(term, text) {

    return `
        <span class="tooltip">

            ${text}

            <span class="tooltip-popup">
                ${tooltips[term]}
            </span>

        </span>
    `;

}
    
async function analyzeStock() {
    const name = document.getElementById("companyInput").value.trim();

    if (!name) {
        alert("Please enter a company name.");
        return;
    }

    document.getElementById("assessment").innerHTML =
    '<span class="analyzing">Analyzing now...</span>';
    try {
        const response = await fetch(`/lookup?name=${encodeURIComponent(name)}`);
        const data = await response.json();

        if (!data.ticker) {
            document.getElementById("ticker").textContent = "—";
            document.getElementById("exchange").textContent = "—";
            document.getElementById("price").textContent = "—";
            document.getElementById("eps").textContent = "—";
            document.getElementById("pe").textContent = "—";
            document.getElementById("industry").textContent = "—";
            document.getElementById("peerMedian").textContent = "—";
            document.getElementById("rating").textContent = data.assessment?.rating ?? "Unknown";
            document.getElementById("peers").innerHTML = "—";

            document.getElementById("assessment").innerHTML = `
                <h3>Company Not Found</h3>

                <p>
                    ${data.assessment?.explanation ??
                    "This company could not be resolved to a supported U.S. stock ticker."}
                </p>

                <hr>

                <h3>Possible Reasons</h3>

                <p>• The company may be privately held.</p>
                <p>• The company may trade only on a foreign stock exchange.</p>
                <p>• The company name may be misspelled.</p>
                <p>• The company may be a recent IPO, merger, or ticker change that is not yet recognized by the current AI ticker lookup.</p>
            `;

            return;
        }

        document.getElementById("ticker").textContent = data.ticker ?? "—";
        document.getElementById("exchange").textContent = data.exchange ?? "—";
        document.getElementById("price").textContent = data.price ? "$" + Number(data.price).toFixed(2) : "—";
        document.getElementById("eps").textContent = data.eps ?? "—";
        document.getElementById("pe").textContent = data.pe ? Number(data.pe).toFixed(2) : "—";
        document.getElementById("industry").textContent = data.industry_used ?? "—";
        document.getElementById("peerMedian").textContent = data.peer_median_pe ? Number(data.peer_median_pe).toFixed(2) : "—";
        

        document.getElementById("peHelpContent").innerHTML = `
            <h2>What is the P/E Ratio?</h2>

            <p>
                The P/E (Price-to-Earnings) ratio is one of the most common ways investors judge whether a stock is reasonably priced.
            </p>

            <p>
                It compares a company's current stock price to the profit the company earns for each share of stock.
            </p>

            <p>
                <strong>
                    P/E = Stock Price ÷ Earnings Per Share (${tooltip("eps","EPS")})
                </strong>
            </p>

            <p>
                A company's P/E ratio becomes much more meaningful when compared with similar companies in the same industry.
            </p>

            <p>
                <strong>If a company's P/E ratio is lower than its peers</strong>, the stock may be undervalued. If the market later recognizes that the company deserves a valuation similar to its peers, the stock price has the potential to rise.
            </p>

            <p>
                <strong>If a company's P/E ratio is higher than its peers</strong>, investors are paying a premium because they expect stronger future growth. If the company delivers that growth, the higher valuation may be justified. If not, the stock price may have limited upside or could decline.
            </p>

            <p>
                This analyzer compares the company's P/E ratio with carefully selected peer companies to estimate whether the stock appears <strong>undervalued</strong>, <strong>fairly valued</strong>, or <strong>overvalued</strong>.
            </p>
        `;

        
        document.getElementById("peers").innerHTML =
            data.peers && data.peers.length
            ? data.peers.map(p => `<span>${p}</span>`).join("")
            : "—";

        const rating = data.assessment?.rating ?? "Unknown";

        let ratingClass = "rating-orange";

        if (rating === "Undervalued")
            ratingClass = "rating-green";
        else if (rating === "Overvalued")
            ratingClass = "rating-red";
        else if (rating === "Fairly Valued")
            ratingClass = "rating-blue";

        document.getElementById("assessment").innerHTML = `
            <h3 class="${ratingClass}">${rating}</h3>

            <p>${data.assessment?.explanation ?? "No explanation available."}</p>

            <hr>
        `;

    } 
    
    catch (error) {
        console.error(error);
        document.getElementById("assessment").innerHTML =
            "Error analyzing stock.<br><br>" + error.message;
    }
}
</script>

</body>
</html>
